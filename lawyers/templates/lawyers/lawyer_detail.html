{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lawyer Profile</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/lawyer_detail.css' %}">


</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="profile-card text-center">

                <!-- Image -->
                <img src="{% static 'images/default.png' %}" class="profile-img mb-3">

                <!-- Name -->
                <h2 class="fw-bold">{{ lawyer.name }}</h2>

                <!-- Specialization -->
                <span class="badge-special">{{ lawyer.specialization }}</span>

                <!-- Rating -->
                <p class="mt-2 text-muted">⭐ 4.9 Rating</p>

                <hr>

                <!-- Info -->
                <div class="row text-start">

                    <div class="col-md-6 mb-3">
                        <div class="info-box">
                            <b>Email:</b><br>
                            {{ lawyer.email }}
                        </div>
                    </div>

                    <div class="col-md-6 mb-3">
                        <div class="info-box">
                            <b>Experience:</b><br>
                            {{ lawyer.experience }} Years
                        </div>
                    </div>

                </div>

                <!-- Buttons -->
                <div class="mt-4">
                    <a href="/lawyers/" class="btn btn-secondary">⬅ Back</a>
                    <button class="btn btn-main ms-2">Book Appointment</button>
                </div>

            </div>

        </div>
    </div>

</div>

</body>
</html>
