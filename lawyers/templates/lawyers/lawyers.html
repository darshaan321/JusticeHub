{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lawyers</title>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/lawyer.css' %}">
</head>

<body>

<nav class="navbar navbar-expand-lg neo-navbar fixed-top"> 
    <div class="container">
      <a class="navbar-brand" href="#">
        <img src="{% static "img/No Need.jpeg" %}" alt="justice Hub" height="45">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link active" href="{% url 'index' %}">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'lawyers' %}">Lawyers</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'service' %}">Services</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Get Started</a></li>
          
        </ul>
      </div>
    </div>
  </nav>

<!-- Main -->
<main class="container" style="padding-top:120px;">
    
    <h1 class="section-title mb-4">Find Expert Lawyers</h1>

    <!-- ✅ SEARCH (NO JS) -->
    <form method="GET" class="search-box mb-5 d-flex">
        <input type="text" name="q" placeholder="Search..." value="{{ request.GET.q }}">
        <button class="search-btn ms-2">Search</button>
    </form>

    <!-- ✅ DYNAMIC DATA -->
    <div class="row g-4">

        {% for lawyer in lawyers %}
        <div class="col-lg-4 col-md-6">
            <div class="lawyer-card">
                <h5>{{ lawyer.name }}</h5>
                <span class="specialty-badge">{{ lawyer.specialization }}</span>

                <div class="d-flex justify-content-between my-3">
                    <span class="experience-chip">{{ lawyer.experience }} Years</span>
                    <span>⭐ 4.9</span>
                </div>

                <a href="{% url 'lawyer_detail' lawyer.id %}" class="btn gradient-btn w-100">
                    View Profile
                </a>
            </div>
        </div>
        {% empty %}
        <p>No lawyers found</p>
        {% endfor %}

    </div>

</main>

</body>
</html>
