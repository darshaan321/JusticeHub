{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Registration</title>
    <link rel="stylesheet" href="{% static 'css/user_registration.css' %}">

    <!-- SweetAlert -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css">
    
</head>
<body>

<div class="register-container">
    <h2>Client Registration</h2>

    <form action="{% url 'user_registration' %}" method="post" enctype=" multipart/form-data">
         {% csrf_token %}
        <div class="input-group">
            <input type="text" name="first_Name" placeholder="First Name" required>
        </div>

        <div class="input-group">
            <input type="text" name="last_Name" placeholder="Last Name" required>
        </div>

        <div class="input-group">
            <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="input-group">
            <input type="text" name="contact_number" placeholder="Contact Number" required>
        </div>

        <div class="input-group">
            <textarea name="full_address" placeholder="Full Address" required></textarea>
        </div>

        <div class="input-group">
            <input type="text" name="city" placeholder="City" required>
        </div>

        <div class="input-group">
            <input type="text" name="zip_code" placeholder="Zip Code" required>
        </div>

        <div class="input-group">
            <input type="file" name="fileToUpload">
        </div>

        <button type="submit" class="btn-register">Register</button>
    </form>
</div>

{% if messages %}
    {% for message in messages %}
        <div style="color: green; background: #e6ffe6; padding: 10px; margin-bottom: 10px;">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
<div style="color: white; background: green; padding: 12px; border-radius: 5px;">

</body>
</html>
